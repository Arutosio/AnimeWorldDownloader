name: Build and Release

# Si attiva SOLO quando viene pushato un tag di versione (es. v1.10).
# Niente release automatiche sui push a master, niente nomi con la data:
# il nome è sempre "AnimeWorldDownloader <tag>".
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore
        run: dotnet restore AnimeWorldDownloader_App/AnimeWorldDownloader_App.csproj

      - name: Publish
        run: |
          dotnet publish AnimeWorldDownloader_App/AnimeWorldDownloader_App.csproj `
            -c Release `
            -f net10.0-windows10.0.19041.0 `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Create zip
        run: Compress-Archive -Path ./publish/* -DestinationPath ./AnimeWorldDownloader_${{ github.ref_name }}_win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AnimeWorldDownloader ${{ github.ref_name }}
          body: |
            ## AnimeWorldDownloader ${{ github.ref_name }}

            Eseguibile Windows standalone (non richiede .NET installato).

            ### Come usare
            1. Scarica lo zip allegato
            2. Estrai la cartella
            3. Esegui `AnimeWorldDownloader_App.exe`
          files: ./AnimeWorldDownloader_${{ github.ref_name }}_win-x64.zip
          draft: false
          prerelease: false
          make_latest: true
